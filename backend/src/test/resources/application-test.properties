spring.datasource.url=jdbc:h2:mem:fight_league_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
app.seed.enabled=false
app.security.jwt.secret=test-secret-key-change-before-production-32chars-minimum
app.security.jwt.issuer=fight-league-ko-test
app.security.jwt.expiration-minutes=60
app.security.default-admin.username=admin
app.security.default-admin.email=admin@fightleague.local
app.security.default-admin.password=admin1234
