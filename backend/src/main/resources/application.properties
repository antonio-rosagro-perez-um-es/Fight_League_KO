spring.application.name=FightLeagueKO

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fight_league_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate extras
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Security
app.security.jwt.secret=dev-only-secret-key-change-before-production-32chars-minimum
app.security.jwt.issuer=fight-league-ko
app.security.jwt.expiration-minutes=60
app.security.default-admin.username=admin
app.security.default-admin.email=admin@fightleague.local
app.security.default-admin.password=admin1234
