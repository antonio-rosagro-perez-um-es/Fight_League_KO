spring.application.name=FightLeagueKO

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fight_league_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate extras
spring.jpa.properties.hibernate.format_sql=true

# SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}

# Security
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:dev-only-secret-key-change-before-production-32chars-minimum}
app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:fight-league-ko}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}
app.security.default-admin.username=${APP_SECURITY_DEFAULT_ADMIN_USERNAME:admin}
app.security.default-admin.email=${APP_SECURITY_DEFAULT_ADMIN_EMAIL:admin@fightleague.local}
app.security.default-admin.password=${APP_SECURITY_DEFAULT_ADMIN_PASSWORD:admin1234}

# Root asset folder used by the Angular frontend asset pipeline.
# Docker Compose overrides this so backend uploads and nginx static assets share the same root assets/fighters folder.
app.assets.fighters-path=${APP_ASSETS_FIGHTERS_PATH:../assets/fighters}
